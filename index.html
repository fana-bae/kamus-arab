<!DOCTYPE html>
<html lang="id" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Kamus Digital Arab-Indonesia — Cari kosa kata bahasa Arab dan terjemahan Indonesianya dengan mudah dan cepat.">
    <title>قاموس — Kamus Digital Arab Indonesia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <!-- Header -->
    <header id="main-header">
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Logo Amtsilati" class="logo-img">
                <span class="logo-divider"></span>
                <span class="logo-text">Kamus Banom Bahasa</span>
            </div>
            <button id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Hero / Search Section -->
    <main>
        <section id="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="hero-arabic">اِبْحَثْ عَنِ الكَلِمَة</span>
                    <span class="hero-subtitle">Temukan Kosa Kata Arab-Indonesia</span>
                </h1>
                <div class="search-container" id="search-container">
                    <div class="search-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Ketik kata Arab atau Indonesia..."
                        autocomplete="off" autofocus>
                    <button id="clear-search" class="clear-btn hidden" aria-label="Clear search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="search-stats" id="search-stats"></div>
            </div>
        </section>


        <!-- Results Section -->
        <section id="results-section">
            <div class="results-grid" id="results-grid">
                <!-- Cards generated by JS -->
            </div>
            <div class="no-results hidden" id="no-results">
                <div class="no-results-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </div>
                <h3>Kata tidak ditemukan</h3>
                <p>Coba gunakan kata kunci lain atau periksa ejaan</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="main-footer">
        <p>Banom Bahasa— Kamus Digital Arab-Indonesia &copy; 2026</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
